<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Present Tense — A Student's Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=EB+Garamond:ital,wght@0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
   <link rel="stylesheet" href="assets/css/responsive.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Midnight Linen — mirrors chapter1 palette exactly */
      --bg-outer:    #0E0E14;   /* body background */
      --page-left:   #1C1C22;   /* spine */
      --page-right:  #22222A;   /* cover */
      --gold:        #B89A6A;   /* primary accent */
      --gold-soft:   #D4BC96;   /* lighter gold */
      --gold-dim:    #8C7040;   /* darker gold */
      --ink-bright:  #EDE8DF;   /* headings / title */
      --ink-mid:     #C8C2B5;   /* body text */
      --ink-light:   #9A9488;   /* muted labels */
      --ink-faint:   #6A6460;   /* very muted */
      --sand-1:      #2A2830;   /* pages peek dark */
      --sand-2:      #242230;   /* pages peek darker */
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-outer);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      position: relative;
    }

    /* Subtle ambient glow — same as chapter1 body::before */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 25%, rgba(184,154,106,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 78% 75%, rgba(184,154,106,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Shelf */
    .shelf-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* Book container */
    .book-wrap {
      display: flex;
      align-items: flex-end;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform-origin: bottom center;
      position: relative;
    }
    .book-wrap:hover {
      transform: translateY(-18px) rotate(-1.5deg);
    }
    .book-wrap:hover .book-glow {
      opacity: 1;
    }

    .book-glow {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 18px;
      background: rgba(184,154,106,0.18);
      filter: blur(14px);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    /* Spine */
    .spine {
      width: 32px;
      height: 420px;
      background: var(--page-left);
      border-radius: 4px 0 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      border-right: 0.5px solid rgba(184,154,106,0.12);
    }
    .spine::before {
      content: '';
      position: absolute;
      top: 8px; bottom: 8px; left: 5px; right: 5px;
      border: 0.5px solid rgba(184,154,106,0.08);
      border-radius: 2px;
      pointer-events: none;
    }
    /* spine shadow (inner glow on right edge) */
    .spine::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 10px;
      background: linear-gradient(to left, rgba(0,0,0,0.28), transparent);
      pointer-events: none;
    }
    .spine-text {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 300;
      color: var(--ink-light);
      letter-spacing: 0.22em;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      text-transform: uppercase;
      opacity: 0.85;
    }

    /* Cover */
    .cover {
      width: 280px;
      height: 420px;
      background: var(--page-right);
      border-radius: 0 4px 4px 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow:
        6px 0 24px rgba(0,0,0,0.5),
        0 12px 40px rgba(0,0,0,0.6);
    }

    /* Top & bottom decorative strips */
    .cover-strip {
      height: 10px;
      background: rgba(184,154,106,0.12);
      border-top: 0.5px solid rgba(184,154,106,0.2);
      border-bottom: 0.5px solid rgba(184,154,106,0.1);
      flex-shrink: 0;
    }
    .cover-strip.bottom {
      border-top: 0.5px solid rgba(184,154,106,0.1);
      border-bottom: none;
    }

    /* Cover inner */
    .cover-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 18px 14px;
      position: relative;
    }

    /* Decorative frame */
    .cover-frame {
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(184,154,106,0.22);
      border-radius: 2px;
      pointer-events: none;
    }
    .cover-frame::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 0.5px solid rgba(184,154,106,0.10);
      border-radius: 1px;
    }

    /* Corner ornaments */
    .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.45;
    }
    .corner-tl { top: 14px; left: 14px; border-width: 1.5px 0 0 1.5px; }
    .corner-tr { top: 14px; right: 14px; border-width: 1.5px 1.5px 0 0; }
    .corner-bl { bottom: 14px; left: 14px; border-width: 0 0 1.5px 1.5px; }
    .corner-br { bottom: 14px; right: 14px; border-width: 0 1.5px 1.5px 0; }

    .series-label {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--ink-light);
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-top: 8px;
      opacity: 0.8;
    }

    /* Cover image */
    .cover-image-wrap {
      width: 200px;
      height: 110px;
      border: 1px solid rgba(184,154,106,0.22);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
      flex-shrink: 0;
      background: #13131A;
      position: relative;
    }
    .cover-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.82;
      display: block;
    }
    .cover-image-wrap .img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .cover-image-wrap .img-placeholder svg { opacity: 0.25; }
    .cover-image-wrap .img-placeholder span {
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      color: var(--ink-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .ornament-top {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 10px;
      margin-bottom: 8px;
      opacity: 0.55;
    }

    .cover-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-style: italic;
      color: var(--ink-bright);
      line-height: 1.1;
      text-align: center;
      margin-bottom: 6px;
    }

    .cover-subtitle {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: var(--gold-soft);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.75;
    }

    .ornament-mid {
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 8px;
      margin-bottom: 10px;
      opacity: 0.45;
    }

    .cover-author-label {
      font-family: 'Jost', sans-serif;
      font-size: 7.5px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--ink-faint);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .cover-author {
      font-family: 'EB Garamond', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--ink-mid);
      text-align: center;
      margin-bottom: 6px;
    }

    .cover-year {
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--ink-faint);
      opacity: 0.7;
      text-transform: uppercase;
    }

    /* Pages peek */
    .pages {
      display: flex;
    }
    .page-peek {
      width: 7px;
      height: 420px;
      border-radius: 0 3px 3px 0;
    }

    /* Shelf plank — dark to match linen theme */
    .shelf-plank {
      width: 420px;
      height: 14px;
      background: linear-gradient(180deg, #2A2830 0%, #1E1C24 100%);
      border-radius: 0 0 4px 4px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      position: relative;
    }
    .shelf-plank::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(184,154,106,0.12);
    }

    /* CTA button — matches chapter1 nav-btn style */
    .open-btn {
      margin-top: 28px;
      font-family: 'EB Garamond', serif;
      font-size: 15px;
      font-style: italic;
      color: var(--ink-mid);
      background: rgba(28,28,34,0.92);
      border: 0.5px solid rgba(184,154,106,0.3);
      border-radius: 2px;
      padding: 10px 32px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.25s, border-color 0.25s;
      text-decoration: none;
      display: inline-block;
      backdrop-filter: blur(4px);
    }
    .open-btn:hover {
      background: rgba(184,154,106,0.12);
      border-color: rgba(184,154,106,0.6);
    }

    .hint-text {
      margin-top: 12px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 300;
      color: var(--ink-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    /* Entry animation */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .shelf-scene { animation: riseIn 0.9s ease both; }
    .open-btn    { animation: riseIn 0.9s 0.3s ease both; }
    .hint-text   { animation: riseIn 0.9s 0.5s ease both; }
  </style>
</head>
<body>

  <div class="shelf-scene">

    <div class="book-wrap" onclick="window.location.href='titlepage.html'">
      <div class="book-glow"></div>

      <!-- Spine -->
      <div class="spine">
        <span class="spine-text">Industry Visit &nbsp;·&nbsp; 2025</span>
      </div>

      <!-- Cover -->
      <div class="cover">
        <div class="cover-strip"></div>

        <div class="cover-inner">
          <!-- Decorative frame & corners -->
          <div class="cover-frame"></div>
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>

          <p class="series-label">An Educational Tour &nbsp;·&nbsp; 7 Days</p>

          <div class="cover-image-wrap">
            <img src="images/batch2025-2026.webp" alt="Tour photo" />
          </div>

          <p class="ornament-top">— ✦ —</p>

          <h1 class="cover-title">Industry<br>Visit</h1>
          <p class="cover-subtitle">A Student's Account</p>

          <p class="ornament-mid">· · ·</p>

          <p class="cover-author-label">Written by</p>
          <p class="cover-author">Marwina Samson</p>

          <p class="cover-year">Educational Tour & Industry Visit · 2025</p>
        </div>

        <div class="cover-strip bottom"></div>
      </div>

      <!-- Pages peek on the right -->
      <div class="pages">
        <div class="page-peek" style="background:#2A2830;"></div>
        <div class="page-peek" style="background:#242230; width:5px;"></div>
        <div class="page-peek" style="background:#1E1C28; width:4px;"></div>
      </div>
    </div>

    <!-- Shelf plank -->
    <div class="shelf-plank"></div>

    <!-- CTA -->
    <a class="open-btn" href="titlepage.html">Open the book &nbsp;→</a>
    <p class="hint-text">Click the book or the button to begin</p>

  </div>

</body>
</html>
